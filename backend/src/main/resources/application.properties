server.port=3001

# Session
spring.session.store-type=none
server.servlet.session.timeout=7d
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Strava OAuth
strava.client-id=${STRAVA_CLIENT_ID:your_strava_client_id}
strava.client-secret=${STRAVA_CLIENT_SECRET:your_strava_client_secret}
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:3001/api/auth/strava/callback}

# Garmin OAuth 1.0a
garmin.consumer-key=${GARMIN_CONSUMER_KEY:your_garmin_consumer_key}
garmin.consumer-secret=${GARMIN_CONSUMER_SECRET:your_garmin_consumer_secret}
garmin.redirect-uri=${GARMIN_REDIRECT_URI:http://localhost:3001/api/auth/garmin/callback}

# Frontend
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.com.traintrack=DEBUG
logging.level.org.springframework.web=INFO
