server.port=3001

# Session — 2h idle timeout, cookie flags
spring.session.store-type=none
server.servlet.session.timeout=2h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# Strava OAuth
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:3001/api/auth/strava/callback}

# Garmin OAuth 1.0a
garmin.consumer-key=${GARMIN_CONSUMER_KEY:}
garmin.consumer-secret=${GARMIN_CONSUMER_SECRET:}
garmin.redirect-uri=${GARMIN_REDIRECT_URI:http://localhost:3001/api/auth/garmin/callback}

# Frontend
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging — INFO by default; override per-profile
logging.level.com.traintrack=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
